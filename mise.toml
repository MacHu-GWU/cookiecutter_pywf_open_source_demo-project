# See claude code environment variables documents at https://code.claude.com/docs/en/settings
[env]

[tools]
python = "3.12"
uv = "latest"
claude = "latest"

# === Tasks
[tasks.venv-create]
description = "✨ Create Python virtual environment (.venv)"
run = "uv venv"

[tasks.venv-remove]
description = "💥 Remove Python virtual environment folder (.venv)"
run = "rm -r .venv"

[tasks.inst]
description = "💾 Install Python dependencies (dev, test, doc, etc.) via uv"
run = "uv sync --all-extras"

[tasks.export]
description = "💾 Export Core Python dependencies to requirements.txt via uv"
run = "uv export --format requirements-txt --no-dev --no-emit-project --no-hashes --no-annotate --no-emit-package pywin32 --no-emit-package colorama --no-emit-package tzdata | sed 's/ ; platform_machine ==.*or.*//' > requirements.txt"

[tasks.test]
description = "🧪 Run Python tests with pytest"
run = ".venv/bin/pytest tests"

[tasks.cov]
description = "🧪 Run Python code coverage tests with pytest"
run = ".venv/bin/pytest tests -s --tb=native --cov=cookiecutter_pywf_open_source_demo --cov-report term-missing --cov-report html:htmlcov"
